##
# FRAS Canada — Local Development Services
#
# Starts PostgreSQL and Meilisearch for local dev.
# The Next.js app runs on the host (not containerized) for fast HMR.
#
# Usage:
#   docker compose up -d          # Start services
#   docker compose down           # Stop services
#   docker compose down -v        # Stop + delete all data volumes
#
# After starting, run `npm run dev` on the host.
# Payload auto-pushes schema changes in dev mode (push: true).
# For production, use `npx payload migrate` (see migration skill).
##

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fras
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  meilisearch:
    image: getmeili/meilisearch:v1.12
    ports:
      - '7700:7700'
    environment:
      MEILI_MASTER_KEY: fras-dev-master-key
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:7700/health']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  meilisearch_data:
